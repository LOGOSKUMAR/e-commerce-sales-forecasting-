<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #2d2e42;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-split {
            display: flex;
            width: 820px;
            min-height: 480px;
            background: #232336;
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            overflow: hidden;
        }
        .register-left {
            flex: 1 1 340px;
            background: linear-gradient(135deg, #5f5fc4 0%, #232336 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 24px;
        }
        .register-left img {
            width: 120px;
            margin-bottom: 24px;
        }
        .register-left h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .register-left p {
            font-size: 1.1rem;
            color: #e0e7ff;
            margin-bottom: 0;
        }
        .register-right {
            flex: 1 1 420px;
            background: #232336;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 44px 36px 36px 36px;
        }
        .register-form-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #fff;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        label {
            font-weight: 500;
            color: #cbd5f5;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            padding: 12px 14px;
            border: 1px solid #44446a;
            border-radius: 7px;
            background: #23233a;
            color: #fff;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            transition: border 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
            border: 1.5px solid #a78bfa;
            outline: none;
        }
        button {
            padding: 12px;
            background: linear-gradient(90deg, #7c3aed 60%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 2px 8px 0 rgba(124,58,237,0.08);
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: linear-gradient(90deg, #6366f1 60%, #7c3aed 100%);
        }
        .login-link {
            text-align: center;
            margin-top: 18px;
            color: #cbd5f5;
        }
        .login-link a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-split">
    <div class="register-left">
        <img src="https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=400&q=80" alt="Branding">
        <h3>Capturing Moments,<br>Creating Memories</h3>
        <p>Join our platform and unlock the power of AI-driven business tools.</p>
    </div>
    <div class="register-right">
        <div class="register-form-title">Create an account</div>
        <form method="post">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>

            <button type="submit">Register</button>
        </form>
        <div class="login-link">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</div>

</body>
</html>
